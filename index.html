<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Parceiros e Máquinas</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <header class="header">
    <div>
      <h1>Controle de Parceiros e Máquinas</h1>
      <p class="subtitle">Gestão por parceiro, situação, pagamento e PIX</p>
    </div>
    <div class="actions">
      <button id="btnAdicionar" class="btn btn-primary">+ Novo Registro</button>
      <button id="btnRecarregar" class="btn btn-ghost">Atualizar Lista</button>
    </div>
  </header>

  <section class="toolbar">
    <div class="field">
      <label for="filtroTexto">Buscar máquina</label>
      <input id="filtroTexto" type="text" placeholder="Digite o nome da máquina...">
    </div>

    <div class="field">
      <label for="filtroSituacao">Filtrar por situação</label>
      <select id="filtroSituacao">
        <option value="todos">Todos</option>
        <option value="TREINAMENTO">TREINAMENTO</option>
        <option value="PRODUCAO">PRODUCAO</option>
      </select>
    </div>

    <div class="field">
      <label for="filtroPagamento">Pagamento mensal</label>
      <select id="filtroPagamento">
        <option value="todos">Todos</option>
        <option value="PENDENTE">PENDENTE</option>
        <option value="NAO_PENDENTE">NAO PENDENTE</option>
      </select>
    </div>

    <div class="field">
      <label for="filtroParceiro">Filtrar por parceiro</label>
      <select id="filtroParceiro">
        <option value="todos">Todos</option>
      </select>
    </div>

    <div class="field">
      <label for="filtroUnidade">Filtrar por unidade</label>
      <select id="filtroUnidade">
        <option value="todos">Todas</option>
      </select>
    </div>

    <div class="field">
      <label for="filtroAgr">Filtrar por AGR</label>
      <select id="filtroAgr">
        <option value="todos">Todos</option>
      </select>
    </div>

    <div class="field">
      <label for="filtroSituacaoMaquina">Sit. da Máquina</label>
      <select id="filtroSituacaoMaquina">
        <option value="todos">Todas</option>
        <option value="CONFIGURADA">Configurada</option>
        <option value="CONFIGURADA FORA DO PADRÃO">Fora do Padrão</option>
        <option value="NÃO CONFIGURADA">Não Configurada</option>
      </select>
    </div>

    <div class="field field-small">
      <label for="ordenacao">Ordenar</label>
      <select id="ordenacao">
        <option value="parceiro-asc">Parceiro (A-Z)</option>
        <option value="maquina-asc">Máquina (A-Z)</option>
        <option value="maquina-desc">Máquina (Z-A)</option>
      </select>
    </div>
  </section>

  <section class="stats">
    <div class="stat-card">
      <span>Total</span>
      <strong id="statTotal">0</strong>
    </div>
    <div class="stat-card">
      <span>TREINAMENTO</span>
      <strong id="statTreinamento">0</strong>
    </div>
    <div class="stat-card">
      <span>PRODUCAO</span>
      <strong id="statProducao">0</strong>
    </div>
    <div class="stat-card">
      <span>NAO PENDENTE</span>
      <strong id="statPago">0</strong>
    </div>
    <div class="stat-card">
      <span>PENDENTE</span>
      <strong id="statPendente">0</strong>
    </div>
  </section>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Unidade</th>
          <th>Máquina</th>
          <th>AGR</th>
          <th>Sit. Máquina</th>
          <th>AGR Filhos</th>
          <th>Situação</th>
          <th>Pagamento</th>
          <th>PIX</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <footer class="table-footer">
    <span id="paginationInfo">Mostrando 0 de 0</span>
    <div class="pagination-actions">
      <button id="btnPrevPage" class="btn btn-ghost btn-small">Anterior</button>
      <button id="btnNextPage" class="btn btn-ghost btn-small">Próxima</button>
    </div>
  </footer>
</div>

<div id="modalMaquina" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitulo">Nova Máquina</h2>
      <button id="btnFecharModal" class="btn btn-ghost btn-small" type="button">Fechar</button>
    </div>
    <form id="formMaquina" class="modal-form">
      <div class="field">
        <label for="modalNome">Máquina</label>
        <input id="modalNome" name="nome" type="text" required maxlength="100">
      </div>
      <div class="field">
        <label for="modalSituacao">Situação</label>
        <select id="modalSituacao" name="situacao" required>
          <option value="TREINAMENTO">TREINAMENTO</option>
          <option value="PRODUCAO">PRODUCAO</option>
        </select>
      </div>
      <div class="field">
        <label for="modalPagamento">Pagamento Mensal</label>
        <select id="modalPagamento" name="pagamento" required>
          <option value="PENDENTE">PENDENTE</option>
          <option value="NAO_PENDENTE">NAO PENDENTE</option>
        </select>
      </div>
      <div class="field">
        <label for="modalPix">PIX do parceiro</label>
        <input id="modalPix" name="pix" type="text" maxlength="180" placeholder="CPF, e-mail, telefone ou chave aleatória">
      </div>
      <div class="field">
        <label for="modalUnidade">Unidade</label>
        <input id="modalUnidade" name="unidade" type="text" maxlength="120" placeholder="Nome da unidade">
      </div>
      <div class="field">
        <label for="modalAgr">AGR</label>
        <input id="modalAgr" name="agr" type="text" maxlength="120" placeholder="Código ou nome do AGR">
      </div>
      <div class="field">
        <label for="modalSituacaoMaquina">Situação da Máquina</label>
        <select id="modalSituacaoMaquina" name="situacaoMaquina">
          <option value="NÃO CONFIGURADA">Não Configurada</option>
          <option value="CONFIGURADA">Configurada</option>
          <option value="CONFIGURADA FORA DO PADRÃO">Configurada Fora do Padrão</option>
        </select>
      </div>
      <div class="field">
        <label for="modalAgrFilhos">AGR possui filhos?</label>
        <select id="modalAgrFilhos" name="agrFilhos">
          <option value="false">Não</option>
          <option value="true">Sim</option>
        </select>
      </div>
      <input id="modalIdAtual" type="hidden">
      <div class="modal-actions">
        <button id="btnSalvarModal" class="btn btn-primary" type="submit">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
